name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check manifest version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST=$(python -c "import json;print(json.load(open('custom_components/petsnowy/manifest.json'))['version'])")
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "Tag $GITHUB_REF_NAME does not match manifest version $MANIFEST" >&2
            exit 1
          fi
          echo "Version $MANIFEST matches tag $GITHUB_REF_NAME"

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[?" v "\\]?" { flag = 1; next }
            flag && /^## / { exit }
            flag { print }
          ' CHANGELOG.md > release_notes.md || true
          echo "--- extracted notes ---"
          cat release_notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -s release_notes.md ]; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release_notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
