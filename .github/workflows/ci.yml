name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install black isort flake8 flake8-bugbear flake8-comprehensions
      - run: black --check custom_components/ tests/
      - run: isort --check-only --profile black custom_components/ tests/
      - run: flake8 custom_components/ --max-line-length 120 --max-complexity 15

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Poetry
        run: pip install poetry
      - name: Configure private repo access
        run: poetry config http-basic.github x-access-token "${{ secrets.PRIVATE_REPO_TOKEN }}"
      - name: Install private dependency
        run: pip install "petsnowy @ git+https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/hypercubian/petsnowy-py.git@v0.1.0"
      - name: Install remaining dependencies
        run: poetry install --no-interaction
      - name: Run unit tests
        run: poetry run pytest tests/unit/ -v

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Poetry
        run: pip install poetry
      - name: Configure private repo access
        run: poetry config http-basic.github x-access-token "${{ secrets.PRIVATE_REPO_TOKEN }}"
      - name: Install private dependency
        run: pip install "petsnowy @ git+https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/hypercubian/petsnowy-py.git@v0.1.0"
      - name: Install remaining dependencies
        run: poetry install --no-interaction
      - name: Run mypy
        run: poetry run mypy custom_components/
